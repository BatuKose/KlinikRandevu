<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasta Kayıt</title>
</head>
<body>
    <!--Hasta kyıt formu-->
    <div id="hastaKayitFormu">
        <h3>Hasta Kayıt/Arama</h3>
        <label>Hasta Ara</label>
        <input type="text" id="ara"> <button id="hastaAra">Hasta ara</button>
        <br>
        <label>Hasta Protokol</label>
        <input type="text" id="hastProtokol" disabled >
        <br>
        <label>Hasta Adı</label>
        <input type="text" id="kName">
        <br>
        <label>Hasta Soyadı</label>
        <input type="text" id="kSurname">
        <br>
        <label>Hasta TC</label>
        <input type="number" id="kTC">
        <br>
        <label>Hasta Adres</label>
        <input type="text" id="kAddress">
        <br>
        <label>Hasta Numara</label>
        <input type="number" id="kPhone">
        <br>
        <label>Hasta Doğum Tarihi</label>
        <input type="date" id="kBirthDate">
        <br>
        <label>Hasta Cinsiyet</label>
        <select id="kGender">
            <option value="0">Belirsiz</option>
            <option value="1">Kadın</option>
            <option value="2">Erkek</option>
        </select>
        <br>
        <label>Hasta Kan Grubu</label>
        <select  id="kBloodType">
            <option value="0">A RH-</option>
            <option value="1">B RH+</option>
            <option value="2">A RH+</option>
            <option value="3">A RH+</option>
            <option value="4">AB RH-</option>
            <option value="5">AB RH+</option>
            <option value="6">0 RH+</option>
            <option value="7">0 RH-</option>
        </select>
        <br>
        <button id="kInsert">Kaydet</button>
        <button id="kIptal">Hasta Sil</button>
    </div>
    <script src="/scripts/hastakayıt.js"></script>
</body>
</html>
